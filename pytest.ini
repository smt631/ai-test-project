[pytest]
# 模块搜索路径（修复 from src.xxx import 报错）
pythonpath = .

# 测试文件发现规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 命令行默认参数（注意：reports/ 目录由 conftest.py 自动创建）
addopts = -v --tb=short --html=reports/report.html --self-contained-html

# 标记注册（用于分类跑测试）
markers =
    smoke: 冒烟测试（快速验证核心功能）
    eval: LLM 评测测试（调用真实 API，较慢）
    safety: 安全测试（Prompt Injection 等）
    slow: 耗时较长的测试
